<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard — HireLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-700 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">🔧 HireLocal</h1>
        <div class="space-x-4">
        <a href="my-bookings.html" class="bg-white text-blue-700 px-4 py-2 rounded font-semibold">My Bookings</a>
            <a href="book-service.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-semibold">+ Book Service</a>
            <a href="../LogoutServlet" class="text-white underline">Logout</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-700 mb-6">Welcome back! 👋</h2>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-blue-700" id="activeJobs">0</p>
                <p class="text-gray-500 mt-1">Active Bookings</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-green-600" id="walletBalance">₹0</p>
                <p class="text-gray-500 mt-1">Wallet Balance</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-gray-700" id="totalJobs">0</p>
                <p class="text-gray-500 mt-1">Total Bookings</p>
            </div>
        </div>

        <h3 class="text-lg font-semibold text-gray-700 mb-3">Recent Bookings</h3>
        <div id="bookingList" class="space-y-3">
            <p class="text-gray-400">Loading...</p>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const res = await fetch("../CustomerDashboardServlet");
                const data = await res.json();

                document.getElementById("activeJobs").textContent = data.activeJobs;
                document.getElementById("walletBalance").textContent = "₹" + data.walletBalance;
                document.getElementById("totalJobs").textContent = data.totalJobs;

                const container = document.getElementById("bookingList");
                container.innerHTML = "";

                if (data.recentJobs.length === 0) {
                    container.innerHTML = "<p class='text-gray-400'>No bookings yet.</p>";
                    return;
                }

                data.recentJobs.forEach(job => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                            <div>
                                <p class="font-semibold">${job.categoryName}</p>
                                <p class="text-gray-500 text-sm">${job.scheduledTime}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-sm font-semibold 
                                ${job.status === 'COMPLETED' ? 'bg-green-100 text-green-700' : 
                                  job.status === 'PENDING' ? 'bg-yellow-100 text-yellow-700' : 
                                  'bg-blue-100 text-blue-700'}">
                                ${job.status}
                            </span>
                        </div>`;
                });
            } catch (e) {
                document.getElementById("bookingList").innerHTML = "<p class='text-red-400'>Error: " + e.message + "</p>";
            }
        }

        loadDashboard();
    </script>
</body>
</html>
