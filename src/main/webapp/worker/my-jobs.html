<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Jobs — HireLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-green-700 text-white p-4">
        <a href="dashboard.html" class="text-white">← Dashboard</a>
        <span class="ml-4 font-bold">My Jobs</span>
    </nav>

    <div class="max-w-3xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-700 mb-4">My Jobs</h2>

        <div class="flex gap-3 mb-6">
            <button onclick="filterJobs('ALL')" class="px-4 py-2 rounded bg-gray-700 text-white">All</button>
            <button onclick="filterJobs('ACCEPTED')" class="px-4 py-2 rounded bg-blue-600 text-white">Accepted</button>
            <button onclick="filterJobs('ONGOING')" class="px-4 py-2 rounded bg-yellow-500 text-white">Ongoing</button>
            <button onclick="filterJobs('COMPLETED')" class="px-4 py-2 rounded bg-green-600 text-white">Completed</button>
        </div>

        <div id="jobList" class="space-y-3">
            <p class="text-gray-400">Loading...</p>
        </div>
    </div>

    <script>
        let allJobs = [];

        async function loadJobs() {
            try {
                const res = await fetch("../WorkerJobsServlet");
                const data = await res.json();
                if (data && data.jobs) {
                    allJobs = data.jobs;
                    renderJobs(allJobs);
                }
            } catch (e) {
                document.getElementById("jobList").innerHTML = "<p class='text-red-400'>Error: " + e.message + "</p>";
            }
        }

        function filterJobs(status) {
            if (status === "ALL") renderJobs(allJobs);
            else renderJobs(allJobs.filter(j => j.status === status));
        }

        function renderJobs(jobs) {
            const container = document.getElementById("jobList");
            container.innerHTML = "";

            if (jobs.length === 0) {
                container.innerHTML = "<p class='text-gray-400'>No jobs found.</p>";
                return;
            }

            jobs.forEach(job => {
                const nextAction = getNextAction(job.status);
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-semibold">${job.categoryName}</p>
                                <p class="text-gray-500 text-sm">${job.description}</p>
                                <p class="text-gray-400 text-xs mt-1">📍 ${job.address}</p>
                                <p class="text-gray-400 text-xs">🕐 ${job.scheduledTime}</p>
                            </div>
                            <div class="text-right ml-4">
                                <span class="text-xs px-2 py-1 rounded-full font-semibold
                                    ${job.status === 'COMPLETED' ? 'bg-green-100 text-green-700' :
                                      job.status === 'STARTED' ? 'bg-yellow-100 text-yellow-700' :
                                      'bg-blue-100 text-blue-700'}">
                                    ${job.status}
                                </span>
                                ${nextAction ? `<br><button onclick="updateStatus(${job.jobId}, '${nextAction.status}')"
                                    class="mt-2 bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
                                    ${nextAction.label}
                                </button>` : ""}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function getNextAction(status) {
            if (status === "ACCEPTED") return { status: "STARTED", label: "Mark Started" };
            if (status === "STARTED") return { status: "COMPLETED", label: "Mark Completed" };
            return null;
        }

        async function updateStatus(jobId, newStatus) {
            const res = await fetch("../BookingServlet", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "action=updateStatus&jobId=" + jobId + "&status=" + newStatus
            });
            const data = await res.json();
            if (data && data.success) loadJobs();
        }

        loadJobs();
    </script>
</body>
</html>
