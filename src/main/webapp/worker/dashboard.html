<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Dashboard — HireLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-green-700 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">🔧 HireLocal — Worker Panel</h1>
        <div class="space-x-4">
            <a href="my-jobs.html" class="bg-white text-green-700 px-4 py-2 rounded font-semibold">My Jobs</a>
            <a href="earnings.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-semibold">Earnings</a>
            <a href="../LogoutServlet" class="text-white underline">Logout</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-700 mb-6">Worker Dashboard 👷</h2>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-green-700" id="totalEarnings">₹0</p>
                <p class="text-gray-500 mt-1">Total Earnings</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-blue-600" id="completedJobs">0</p>
                <p class="text-gray-500 mt-1">Jobs Completed</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center">
                <p class="text-3xl font-bold text-yellow-500" id="myRating">0.0 ⭐</p>
                <p class="text-gray-500 mt-1">My Rating</p>
            </div>
        </div>

        <h3 class="text-lg font-semibold text-gray-700 mb-3">New Job Requests</h3>
        <div id="jobRequests" class="space-y-3">
            <p class="text-gray-400">Loading...</p>
        </div>
    </div>

    <script>
        async function loadWorkerDashboard() {
            try {
                const res = await fetch("../WorkerDashboardServlet");
                const data = await res.json();

                document.getElementById("totalEarnings").textContent = "₹" + data.totalEarnings;
                document.getElementById("completedJobs").textContent = data.completedJobs;
                document.getElementById("myRating").textContent = data.rating + " ⭐";

                const container = document.getElementById("jobRequests");
                container.innerHTML = "";

                if (data.newJobs.length === 0) {
                    container.innerHTML = "<p class='text-gray-400'>No new job requests right now.</p>";
                    return;
                }

                data.newJobs.forEach(job => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-lg shadow">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="font-semibold">${job.categoryName}</p>
                                    <p class="text-gray-500 text-sm">${job.description}</p>
                                    <p class="text-gray-400 text-xs mt-1">📍 ${job.address} | 🕐 ${job.scheduledTime}</p>
                                </div>
                                <div class="flex flex-col gap-2 ml-4">
                                    <button onclick="respondJob(${job.assignmentId}, 'ACCEPTED')"
                                        class="bg-green-500 text-white px-4 py-1 rounded font-semibold hover:bg-green-600">
                                        Accept
                                    </button>
                                    <button onclick="respondJob(${job.assignmentId}, 'REJECTED')"
                                        class="bg-red-400 text-white px-4 py-1 rounded font-semibold hover:bg-red-500">
                                        Reject
                                    </button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                document.getElementById("jobRequests").innerHTML = "<p class='text-red-400'>Error loading jobs: " + e.message + "</p>";
            }
        }

        async function respondJob(assignmentId, status) {
            await fetch("../BookingServlet", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "action=updateStatus&jobId=" + assignmentId + "&status=" + status
            });
            loadWorkerDashboard();
        }

        loadWorkerDashboard();
    </script>
</body>
</html>
