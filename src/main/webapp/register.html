<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — HireLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-10">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-700 mb-6 text-center">🔧 Create Account</h2>

        <div id="msg" class="hidden p-3 rounded mb-4"></div>

        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Full Name</label>
            <input type="text" id="name" class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Email</label>
            <input type="email" id="email" class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Phone</label>
            <input type="text" id="phone" class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Password</label>
            <input type="password" id="password" class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Register as</label>
            <select id="role" class="w-full border rounded px-3 py-2" onchange="toggleWorkerFields()">
                <option value="CUSTOMER">Customer</option>
                <option value="WORKER">Worker / Gig Provider</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-1">City</label>
            <select id="cityId" class="w-full border rounded px-3 py-2">
                <option value="1">Bhopal</option>
                <option value="2">Indore</option>
                <option value="3">Jabalpur</option>
            </select>
        </div>

        <div id="workerFields" class="hidden">
            <hr class="my-4">
            <p class="text-blue-700 font-semibold mb-3">Worker Details</p>

            <div class="mb-4">
                <label class="block text-gray-600 mb-1">Skill Category</label>
                <select id="skillCategoryId" class="w-full border rounded px-3 py-2">
                    <option value="1">Electrician</option>
                    <option value="2">Plumber</option>
                    <option value="3">Carpenter</option>
                    <option value="4">AC Repair</option>
                    <option value="5">Painter</option>
                    <option value="6">House Cleaning</option>
                    <option value="7">Car Washing</option>
                    <option value="8">Salon at Home</option>
                    <option value="9">Yoga Trainer</option>
                    <option value="10">Packers & Movers</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-600 mb-1">Base Price (₹ per visit)</label>
                <input type="number" id="basePrice" class="w-full border rounded px-3 py-2" placeholder="e.g. 500">
            </div>

            <div class="mb-4">
                <label class="block text-gray-600 mb-1">Service Area</label>
                <input type="text" id="serviceArea" class="w-full border rounded px-3 py-2" placeholder="e.g. Bhopal, MP Nagar">
            </div>

            <div class="mb-4">
                <label class="block text-gray-600 mb-1">Experience (Years)</label>
                <input type="number" id="experienceYears" class="w-full border rounded px-3 py-2" placeholder="e.g. 3">
            </div>
        </div>
 
        <button onclick="doRegister()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">
            Register
        </button>

        <p class="text-center mt-4 text-sm">Already have account? <a href="login.html" class="text-blue-600">Login</a></p>
    </div>

    <script>
        function toggleWorkerFields() {
            const role = document.getElementById("role").value;
            const workerFields = document.getElementById("workerFields");
            if (role === "WORKER") {
                workerFields.classList.remove("hidden");
            } else {
                workerFields.classList.add("hidden");
            }
        }

        async function doRegister() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            const cityId = document.getElementById("cityId").value;

            if (!name || !email || !phone || !password || !role || !cityId) {
                showMsg("Please fill all fields", false);
                return;
            }

            if (role === "WORKER") {
                const basePrice = document.getElementById("basePrice").value;
                const serviceArea = document.getElementById("serviceArea").value;
                const experienceYears = document.getElementById("experienceYears").value;
                const skillCategoryId = document.getElementById("skillCategoryId").value;

                if (!basePrice || !serviceArea || !experienceYears) {
                    showMsg("Please fill all worker details", false);
                    return;
                }
            }

            let body = "name=" + encodeURIComponent(name) +
                       "&email=" + encodeURIComponent(email) +
                       "&phone=" + encodeURIComponent(phone) +
                       "&password=" + encodeURIComponent(password) +
                       "&role=" + encodeURIComponent(role) +
                       "&cityId=" + encodeURIComponent(cityId);

            if (role === "WORKER") {
                body += "&skillCategoryId=" + document.getElementById("skillCategoryId").value +
                        "&basePrice=" + document.getElementById("basePrice").value +
                        "&serviceArea=" + encodeURIComponent(document.getElementById("serviceArea").value) +
                        "&experienceYears=" + document.getElementById("experienceYears").value;
            }

            const res = await fetch("RegisterServlet", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: body
            });

            const data = await res.json();

            if (data.success) {
                showMsg("Registration successful! Redirecting...", true);
                setTimeout(() => window.location.href = "login.html", 1500);
            } else {
                showMsg(data.message, false);
            }
        }

        function showMsg(text, success) {
            const msg = document.getElementById("msg");
            msg.classList.remove("hidden");
            msg.className = "p-3 rounded mb-4 " + (success ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700");
            msg.textContent = text;
        }
    </script>
</body>
</html>
