<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — HireLocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-700 mb-6 text-center">🔧 HireLocal Login</h2>

        <div id="errorMsg" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>

        <div class="mb-4">
            <label class="block text-gray-600 mb-1">Email</label>
            <input type="email" id="email" class="w-full border rounded px-3 py-2" placeholder="Enter email">
        </div>

        <div class="mb-6">
            <label class="block text-gray-600 mb-1">Password</label>
            <input type="password" id="password" class="w-full border rounded px-3 py-2" placeholder="Enter password">
        </div>

        <button onclick="doLogin()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">
            Login
        </button>

        <p class="text-center mt-4 text-sm">Don't have account? <a href="register.html" class="text-blue-600">Register here</a></p>
    </div>

    <script>
    async function doLogin() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const res = await fetch("LoginServlet", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "email=" + encodeURIComponent(email) +
                  "&password=" + encodeURIComponent(password)
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = data.redirect;
        } else {
            const err = document.getElementById("errorMsg");
            err.textContent = data.message;
            err.classList.remove("hidden");
        }
    }
    </script>
</body>
</html>
